<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="color1-button">Color #1</button>
    <button id="color2-button">Color #2</button>
    <button id="color3-button">Color #3</button>
    <h1>Top 3 Colors of <span>All Time</span></h1>
    <ol>
      <li>
        <h3 id="color1">Color #1</h3>
        <p class="purple">More about this Color.</p>
      </li>

      <li>
        <h3 id="color2">Color #2</h3>
        <p class="blue">More about this Color.</p>
      </li>

      <li>
        <h3 id="color3">Color #3</h3>
        <p class="red">More about this Color</p>
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      // ======================== Button #1
      $("#color1-button").click(function () {
        $("#color1").css("color", "violet");

        //new stuff ↓
        $("body").css("background-color", "mediumorchid");
        $("h1").css("color","violet");
        $("h3").css("color","violet");
        $("ol").css("color","violet");
        $("p").css("color","violet");
        $(".purple").text("Very good, nice and vibrant. The color of grapes, which is also very good.");

        $("#color1").text("PURPLE: This is Medium Orchid");
      });

      // ======================== Button #2
      $("#color2-button").click(function () {
        $("#color2").css("color", "blue");

        //new stuff ↓
        $("body").css("background-color", "cornflowerblue");
        $("h1").css("color","paleturquoise");
        $("h3").css("color","paleturquoise");
        $("ol").css("color","paleturquoise");
        $("p").css("color","paleturquoise");
        $(".blue").text("This is the color of the sky, which we need to survive so thats a bonus. This is also the color of water, which is something we also need to survive. Very good.");

        $("#color2").text("BLUE: this is Cornflower Blue");
      });

      // ======================== Button #3
      $("#color3-button").click(function () {
        $("#color3").css("color", "tomato");

        //new stuff ↓
        $("body").css("background-color", "firebrick");
        $("h1").css("color","tomato");
        $("h3").css("color","tomato");
        $("ol").css("color","tomato");
        $("p").css("color","tomato");
        $(".red").text("The color of blood, we need this for our hearts. Also fire, which made us civilized (woohoo) and it also is a trype of wood.");

         $("#color3").text("RED: This is Firebrick");
      });


    </script>
  </body>
</html>
